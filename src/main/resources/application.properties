spring.application.name=EmailNotificationMicroservice
server.port=0
spring.kafka.consumer.bootstrap-servers=localhost:9092, localhost:9094
#spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
#spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer
spring.kafka.consumer.group-id=product-created-event
spring.kafka.consumer.properties.spring.json.trusted.packages=com.kp.kafka.core.bean
#spring.kafka.consumer.properties.spring.json.trusted.packages=*

pring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console